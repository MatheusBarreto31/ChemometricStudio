<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Routing Map Concepts</title>
  <desc id="desc">Nodes and routes representing a chemometric pipeline.</desc>
  <rect width="980" height="420" fill="#f2f7f5"/>
  <g stroke="#7ba095" stroke-width="2" fill="none">
    <path d="M170 120 C 250 120, 250 210, 330 210"/>
    <path d="M170 120 C 260 120, 250 300, 330 300"/>
    <path d="M450 210 C 560 210, 560 210, 670 210"/>
    <path d="M450 300 C 560 300, 560 230, 670 230"/>
    <path d="M790 220 C 850 220, 860 220, 920 220"/>
  </g>

  <g font-family="Segoe UI, Trebuchet MS, sans-serif" font-size="16" text-anchor="middle" fill="#ffffff">
    <rect x="50" y="90" width="120" height="60" rx="10" fill="#0a7b58"/>
    <text x="110" y="127">Data Input</text>

    <rect x="330" y="180" width="120" height="60" rx="10" fill="#1d8b63"/>
    <text x="390" y="217">Preprocess</text>

    <rect x="330" y="270" width="120" height="60" rx="10" fill="#2e9b70"/>
    <text x="390" y="307">Validation</text>

    <rect x="670" y="190" width="120" height="60" rx="10" fill="#2a7f95"/>
    <text x="730" y="227">Model Fit</text>

    <rect x="920" y="190" width="120" height="60" rx="10" fill="#3c6d99" transform="translate(-60,0)"/>
    <text x="890" y="227">Outputs</text>
  </g>
</svg>
